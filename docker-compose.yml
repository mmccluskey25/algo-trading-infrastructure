version: "3.8"

services:
  redis:
    image: "redis:latest"
    container_name: "${PREFIX}_redis"
    ports:
      - "${REDIS_EXT_PORT}:6379"
    volumes:
      - ${HOST_REDIS_PATH}:/data
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --protected-mode no
    networks:
      - trading_net
    restart: unless-stopped

  # Microservices
  oanda_listener:
    container_name: "${PREFIX}_oanda_listener"
    build:
      context: .
      dockerfile: services/oanda_listener/Dockerfile
    restart: unless-stopped
    depends_on:
      - redis
    networks:
      - trading_net
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_HOST
      - REDIS_PORT
      - ACCOUNT_ID
      - API_TOKEN
      - INSTRUMENTS
      #- OANDA_ENV

  stream_writer:
    container_name: "${PREFIX}_stream_writer"
    build:
      context: .
      dockerfile: services/stream_writer/Dockerfile
    restart: unless-stopped
    volumes:
      - ${HOST_DATA_PATH}:/data
    depends_on:
      - redis
    networks:
      - trading_net
    environment:
      - PYTHONUNBUFFERED=1
      - LANDING_DIR=/data/landing
      - REDIS_HOST
      - REDIS_PORT
      - BROKER_NAME=oanda

  # compactor_ingestor:
  #   container_name: "${PREFIX}_compactor_ingestor"
  #   build:
  #     context: .
  #     dockerfile: services/compactor_ingestor/Dockerfile
  #   restart: unless-stopped
  #   volumes:
  #     - ${HOST_DATA_PATH}:/data
  #   networks:
  #     - trading_net
  #   environment:
  #     - LANDING_DIR=/data/landing/ticks
  #     - BRONZE_DIR=/data/bronze/ticks
  #     - DELETE_RAW=${DELETE_AFTER_COMPACTION}
  #     - COMPACT_INTERVAL=${COMPACTION_INTERVAL_MINS}
  #     - PYTHONUNBUFFERED=1

  # Dagster orchestration
  orchestrator-webserver:
    container_name: "${PREFIX}_orchestrator_webserver"
    build:
      context: .
      dockerfile: services/orchestrator/Dockerfile
    restart: unless-stopped
    ports:
      - "${DAGSTER_EXT_PORT}:3000"
    volumes:
      - ${HOST_DATA_PATH}:/data
    networks:
      - trading_net
    environment:
      - PYTHONUNBUFFERED=1
      - DAGSTER_HOME=/data/dagster
      - LANDING_DIR=/data/landing
      - BRONZE_DIR=/data/bronze
      - DUCKDB_PATH=/data/catalog.duckdb
      - DATA_ROOT=/data
      - DBT_TARGET=prod
      - DELETE_AFTER_COMPACTION
    command: ["dagster-webserver", "-h", "0.0.0.0", "-p", "3000"]

  orchestrator-daemon:
    container_name: "${PREFIX}_orchestrator_daemon"
    build:
      context: .
      dockerfile: services/orchestrator/Dockerfile
    restart: unless-stopped
    volumes:
      - ${HOST_DATA_PATH}:/data
    networks:
      - trading_net
    environment:
      - PYTHONUNBUFFERED=1
      - DAGSTER_HOME=/data/dagster
      - LANDING_DIR=/data/landing
      - BRONZE_DIR=/data/bronze
      - DUCKDB_PATH=/data/catalog.duckdb
      - DATA_ROOT=/data
      - DBT_TARGET=prod
      - DELETE_AFTER_COMPACTION
    command: ["dagster-daemon", "run"]

  # transformer:
  #   container_name: "${PREFIX}_transformer"
  #   build:
  #     context: .
  #     dockerfile: services/transformer/Dockerfile
  #   restart: unless-stopped
  #   volumes:
  #     - ${HOST_DATA_PATH}:/data
  #   networks:
  #     - trading_net
  #   environment:
  #     - PYTHONUNBUFFERED=1
  #     - DBT_TARGET=prod

networks:
  trading_net:
    driver: bridge
