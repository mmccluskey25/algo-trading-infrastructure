name: "trading_bot"
version: "1.0.0"
profile: "trading_bot"

model-paths: ["models"]
test-paths: ["tests"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  trading_bot:
    staging:
      +materialized: external
      +location: "silver/{name}.parquet" # Auto-saves as silver/filename.parquet

    marts:
      +materialized: external
      +location: "gold/{name}.parquet"
