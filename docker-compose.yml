version: "3.8"

services:
  redis:
    image: "redis:latest"
    container_name: "${PREFIX}_redis"
    ports:
      - "${REDIS_EXT_PORT}:6379"
    volumes:
      - ${HOST_REDIS_PATH}:/data
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --protected-mode no
    networks:
      - trading_net
    restart: unless-stopped

  # Microservices
  oanda_listener:
    container_name: "${PREFIX}_oanda_listener"
    build:
      context: .
      dockerfile: services/oanda_listener/Dockerfile
    restart: unless-stopped
    depends_on:
      - redis
    networks:
      - trading_net
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_HOST
      - REDIS_PORT
      - ACCOUNT_ID
      - API_TOKEN
      - INSTRUMENTS
      #- OANDA_ENV

  stream_writer:
    container_name: "${PREFIX}_stream_writer"
    build:
      context: .
      dockerfile: services/stream_writer/Dockerfile
    restart: unless-stopped
    volumes:
      - ${HOST_DATA_PATH}:/data
    depends_on:
      - redis
    networks:
      - trading_net
    environment:
      - PYTHONUNBUFFERED=1
      - DATA_ROOT=/data
      - REDIS_HOST
      - REDIS_PORT
      - BROKER_NAME=oanda

  candle_builder:
    container_name: "${PREFIX}_candle_builder"
    build:
      context: .
      dockerfile: services/candle_builder/Dockerfile
    restart: unless-stopped
    volumes:
      - ${HOST_DATA_PATH}:/data
    depends_on:
      - redis
    networks:
      - trading_net
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_HOST
      - REDIS_PORT
      - CANDLE_BUILDER_QUEUE_KEY=tick_queue:candle_builder
      - CANDLE_FLUSH_INTERVAL=900
      - CANDLE_REDIS_TTL=172800
      - DATA_ROOT=/data

  # Dagster orchestration
  orchestrator-webserver:
    container_name: "${PREFIX}_orchestrator_webserver"
    build:
      context: .
      dockerfile: services/orchestrator/Dockerfile
    restart: unless-stopped
    ports:
      - "${DAGSTER_EXT_PORT}:3000"
    volumes:
      - ${HOST_DATA_PATH}:/data
    networks:
      - trading_net
    environment:
      - PYTHONUNBUFFERED=1
      - DAGSTER_HOME=/data/dagster
      - DATA_ROOT=/data
      - DELETE_AFTER_COMPACTION
    command: ["dagster-webserver", "-h", "0.0.0.0", "-p", "3000"]

  orchestrator-daemon:
    container_name: "${PREFIX}_orchestrator_daemon"
    build:
      context: .
      dockerfile: services/orchestrator/Dockerfile
    restart: unless-stopped
    volumes:
      - ${HOST_DATA_PATH}:/data
    networks:
      - trading_net
    environment:
      - PYTHONUNBUFFERED=1
      - DAGSTER_HOME=/data/dagster
      - DATA_ROOT=/data
      - DELETE_AFTER_COMPACTION
    command: ["dagster-daemon", "run"]

networks:
  trading_net:
    driver: bridge
