trading_bot:
  target: "{{ env_var('DBT_TARGET', 'dev') }}"
  outputs:
    prod:
      type: duckdb
      path: "{{ env_var('DUCKDB_PATH') }}"
      extensions:
        - parquet
      external_root: "{{ env_var('DATA_ROOT') }}"
      vars:
        bronze_path: "{{ env_var('BRONZE_DIR') }}"

    dev:
      type: duckdb
      path: "{{ env_var('DUCKDB_PATH') }}"
      extensions:
        - parquet
      external_root: "{{ env_var('DATA_ROOT') }}"
      vars:
        bronze_path: "{{ env_var('BRONZE_DIR') }}"
