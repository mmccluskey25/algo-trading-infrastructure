version: "3.8"

services:
  redis:
    image: "redis:latest"
    container_name: "ep_redis"
    ports:
      - "6379:6379"
    volumes:
      - ${HOST_REDIS_PATH}:/data
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --protected-mode no
    networks:
      -trading_net
    restart: unless-stopped
  
  # Microservices
  oanda_listener:
    container_name: "ep_oanda_listener"
    build:
      context: .
      dockerfile: services/oanda_listener/Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      - redis
    networks:
      - trading_net

  ingestor:
    container_name: "ep_bronze_ingest"
    build:
      context: .
      dockerfile: services/ingestor/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      - DATA_DIR=/data/bronze
    volumes:
      - ${HOST_DATA_PATH}:/data
    depends_on:
      - redis
    networks:
      - trading_net

networks:
  trading_net:
    driver: bridge
      