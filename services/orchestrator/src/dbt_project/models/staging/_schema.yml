      - name: candle_open
        data_type: timestamp with time zone
        description: "Candle open timestamp (start of the 1-minute window)."
        tests:
          - not_null

      - name: open
        data_type: double
        description: "Mid open price."
        tests:
          - not_null

      - name: high
        data_type: double
        description: "Mid high price."
        tests:
          - not_null

      - name: low
        data_type: double
        description: "Mid low price."
        tests:
          - not_null

      - name: close
        data_type: double
        description: "Mid close price."
        tests:
          - not_null

      - name: bid_open
        data_type: double
        description: "Bid open price."
        tests:
          - not_null

      - name: bid_high
        data_type: double
        description: "Bid high price."
        tests:
          - not_null

      - name: bid_low
        data_type: double
        description: "Bid low price."
        tests:
          - not_null

      - name: bid_close
        data_type: double
        description: "Bid close price."
        tests:
          - not_null

      - name: ask_open
        data_type: double
        description: "Ask open price."
        tests:
          - not_null

      - name: ask_high
        data_type: double
        description: "Ask high price."
        tests:
          - not_null

      - name: ask_low
        data_type: double
        description: "Ask low price."
        tests:
          - not_null

      - name: ask_close
        data_type: double
        description: "Ask close price."
        tests:
          - not_null

      - name: tick_count
        data_type: bigint
        description: "Number of ticks within the 1-minute candle."
        tests:
          - not_null

